<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/resources — code, graphs & notes</title>
<meta name="description" content="Downloadable code, Desmos graphs, and notes shared with the channel.">

<!-- Google AdSense (replace ca-pub-XXXXXXXXXXXXXXXX with your real Publisher ID) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="wrap header-row">
    <a href="/" class="brand"><span class="prompt">~/</span>resources<span class="cursor"></span></a>
    <span class="count-pill" id="countPill">loading…</span>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <p class="hero-eyebrow">// everything I share, in one place</p>
    <h1>Grab the code.<br><span class="dim">Run the graph.</span><br>Keep the notes.</h1>
    <p>Every resource from the channel — scripts, Desmos links, and reference notes — lands here first. Search, filter, and download.</p>
  </div>
</section>

<div class="wrap">
  <div class="ad-slot banner">
    <ins class="adsbygoogle"
      style="display:block; width:100%;"
      data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
      data-ad-slot="0000000000"
      data-ad-format="horizontal"
      data-full-width-responsive="true"></ins>
  </div>

  <div class="controls">
    <div class="search-row">
      <span class="chevron">&gt;</span>
      <input type="text" id="searchInput" placeholder="search resources…" autocomplete="off">
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-chip active" data-filter="all">all</button>
      <!-- category chips injected here -->
    </div>
  </div>

  <div class="layout-with-sidebar">
    <main class="listing">
      <p class="section-label" id="sectionLabel">// showing all resources</p>
      <div class="grid" id="grid"></div>
    </main>

    <aside class="sidebar">
      <div class="ad-slot">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
          data-ad-slot="0000000000"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      </div>
    </aside>
  </div>
</div>

<footer>
  <div class="wrap header-row" style="flex-wrap:wrap;">
    <span>© 2026 · resources</span>
    <a href="admin.html">admin</a>
  </div>
</footer>

<script>
(function() {
  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('searchInput');
  const filterRow = document.getElementById('filterRow');
  const countPill = document.getElementById('countPill');
  const sectionLabel = document.getElementById('sectionLabel');

  let allResources = [];
  let activeFilter = 'all';
  let searchTerm = '';

  const CATEGORY_LABELS = {
    code: 'code',
    desmos: 'desmos',
    notes: 'notes'
  };

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function buildFilterChips(resources) {
    const cats = [...new Set(resources.map(r => r.category))];
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.filter = cat;
      btn.textContent = CATEGORY_LABELS[cat] || cat;
      filterRow.appendChild(btn);
    });
  }

  function render() {
    const filtered = allResources.filter(r => {
      const matchesFilter = activeFilter === 'all' || r.category === activeFilter;
      const haystack = (r.title + ' ' + r.description).toLowerCase();
      const matchesSearch = haystack.includes(searchTerm.toLowerCase());
      return matchesFilter && matchesSearch;
    });

    countPill.textContent = allResources.length + ' file' + (allResources.length === 1 ? '' : 's');
    sectionLabel.textContent = activeFilter === 'all'
      ? `// showing all resources (${filtered.length})`
      : `// filtered: ${activeFilter} (${filtered.length})`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="glyph">∅</div>
        <p>No resources match that search.</p>
      </div>`;
      return;
    }

    let html = '';
    filtered.forEach((r, i) => {
      html += `
        <a class="card" href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <span class="tag ${escapeHtml(r.category)}">[${escapeHtml(r.category)}]</span>
            ${r.new ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <h3>${escapeHtml(r.title)}</h3>
          <p>${escapeHtml(r.description)}</p>
          <div class="card-footer">
            <span>${formatDate(r.date)}</span>
            <span class="go">open →</span>
          </div>
        </a>`;

      // in-feed ad every 6 cards
      if ((i + 1) % 6 === 0 && i !== filtered.length - 1) {
        html += `
          <div class="ad-slot in-feed">
            <ins class="adsbygoogle"
              style="display:block"
              data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
              data-ad-slot="0000000000"
              data-ad-format="fluid"
              data-full-width-responsive="true"></ins>
          </div>`;
      }
    });
    grid.innerHTML = html;

    // trigger adsbygoogle for newly inserted ad slots
    document.querySelectorAll('.ad-slot ins:not([data-adsbygoogle-status])').forEach(() => {
      try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
    });
  }

  filterRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-chip');
    if (!btn) return;
    filterRow.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });

  let debounceTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      searchTerm = e.target.value;
      render();
    }, 120);
  });

  fetch('resources.json?_=' + Date.now())
    .then(res => res.json())
    .then(data => {
      allResources = data.sort((a, b) => new Date(b.date) - new Date(a.date));
      buildFilterChips(allResources);
      render();
    })
    .catch(() => {
      countPill.textContent = 'error';
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="glyph">!</div>
        <p>Couldn't load resources.json. Check the file exists in the repo root.</p>
      </div>`;
    });
})();
</script>

</body>
</html>
